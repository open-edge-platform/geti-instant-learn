name: Cleanup Docs Preview Pages

on:
  pull_request:
    types:
      - closed

concurrency:
  group: preview-pages-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  cleanup-preview:
    name: Remove PR preview pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: gh-pages
          path: gh-pages

      - name: Remove preview directory for closed PR
        shell: bash
        run: |
          rm -rf "gh-pages/pr-preview/pr-${{ github.event.pull_request.number }}"

      - name: Publish cleaned gh-pages
        uses: peaceiris/actions-gh-pages@329bcc8f12caed2cefe5a5b80781499a6f3b361b # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./gh-pages
          keep_files: false
