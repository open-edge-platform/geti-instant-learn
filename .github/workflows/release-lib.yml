name: Publish to PyPI

on:
  ####### DELETE AFTER TESTING ########
  pull_request:
  ####### DELETE AFTER TESTING ########
  push:
    tags:
      - "lib/v*.*.*rc*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release artifact tag (e.g., 1.2.3)"
        required: true
        type: string
      sha:
        description: "Git commit SHA to release (40-char hex string)"
        required: true
        type: string

permissions: {} # No permissions by default

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && 'prod' || '' }}
    permissions:
      contents: read
      id-token: write # required by trusted publisher
    timeout-minutes: 30
    steps:
      - name: Validate workflow_dispatch SHA
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          INPUT_SHA: ${{ inputs.sha }}
        run: |
          if [[ ! "$INPUT_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "Error: Provided sha '$INPUT_SHA' is not a valid 40-char commit SHA"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.sha || github.ref }}

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          uv-cache-dependency-glob: 'library/uv.lock'

    ##### DELETE AFTER TESTING #####
    #Uncomment the following line to test environment variable access in the prod environment
    ##### DELETE AFTER TESTING #####
      - name: Validate tag matches VERSION
        working-directory: library
        env:
          TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
        run: |
          TAG_BASE="${TAG#app/v}"
          TAG_VERSION="${TAG_BASE%rc*}"
          FILE_VERSION="$(cat VERSION | tr -d '\n\r')"

          echo "::group::Build parameters"
          echo "Tag name: $TAG"
          echo "Tag base: $TAG_BASE"
          echo "Tag version: $TAG_VERSION"
          echo "File version: $FILE_VERSION"
          echo "::endgroup::"

          # if [[ "$TAG_VERSION" != "$FILE_VERSION" ]]; then
          #   echo "Error: Tag version '$TAG_VERSION' does not match VERSION file '$FILE_VERSION'"
          #   exit 1
          # fi

      - name: Build sdist and wheel
        working-directory: library
        run: uv build

      - name: Verify distributions
        working-directory: library
        run: |
          uv sync
          uv pip install twine
          uv run python -m twine check dist/*

    ##### DELETE AFTER TESTING #####
    #Uncomment the following line to test environment variable access in the prod environment
    ##### DELETE AFTER TESTING #####
      - name: Publish package distributions to TestPyPI
        env:
          TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
        run:  |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "Publishing to PyPI with tag: ${TAG}"
            # uv publish
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "Publishing to TestPyPI with tag: ${TAG}"
            #uv publish --index testpypi
          else
            echo "Wrong event type: ${GITHUB_EVENT_NAME}. This workflow should only be triggered by push or workflow_dispatch events."
            exit 1
          fi
