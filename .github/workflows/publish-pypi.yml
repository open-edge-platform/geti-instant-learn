name: Publish to PyPI

on:
  release:
    types: [published]

permissions: {} # No permissions by default

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          uv-cache-dependency-glob: 'library/uv.lock'

      - name: Set version from release tag
        working-directory: library
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          # Strip leading 'v' from tag (e.g., v0.2.0 -> 0.2.0)
          VERSION="${RELEASE_TAG#v}"
          echo "Setting version to ${VERSION}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - name: Build sdist and wheel
        working-directory: library
        run: |
          uv pip install build --system
          python -m build

      - name: Verify distributions
        working-directory: library
        run: |
          uv pip install twine --system
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: library/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing via OIDC
    environment:
      name: pypi
      url: https://pypi.org/p/instantlearn

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b54a0f536ce1cb02b4f0fb0d # v1.12.4
        with:
          print-hash: true
