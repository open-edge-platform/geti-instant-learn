name: Preview Docs Pages

on:
  pull_request:
    paths:
      - 'application/docs/**'
      - 'library/docs/**'

concurrency:
  group: preview-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy-preview:
    name: Build and deploy docs preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: application/ui/.nvmrc

      - name: Install site dependencies
        working-directory: ./site
        shell: bash
        run: npm ci

      - name: Build docs site
        working-directory: ./site
        shell: bash
        env:
          PR_PREVIEW_NUMBER: ${{ github.event.pull_request.number }}
        run: npm run build

      - name: Deploy preview pages
        uses: peaceiris/actions-gh-pages@329bcc8f12caed2cefe5a5b80781499a6f3b361b # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site/build
          destination_dir: pr-preview/pr-${{ github.event.pull_request.number }}
          keep_files: true
