name: Release Please

on:
  push:
    branches:
      - main

permissions: {} # No permissions by default

jobs:
  release-please:
    name: Manage releases
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create releases and tags
      pull-requests: write # Needed to create release PRs
    timeout-minutes: 15
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          # Use a PAT in RELEASE_PLEASE_TOKEN if release tags should trigger downstream workflows.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Debug release-please outputs
        env:
          RELEASES_CREATED: ${{ steps.release.outputs.releases_created }}
          PATHS_RELEASED: ${{ steps.release.outputs.paths_released }}
          RELEASE_OUTPUTS: ${{ toJSON(steps.release.outputs) }}
        run: |
          echo "releases_created: $RELEASES_CREATED"
          echo "paths_released: $PATHS_RELEASED"
          echo "--- Full JSON outputs ---"
          echo "$RELEASE_OUTPUTS"
