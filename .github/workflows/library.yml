name: library
on:
  workflow_call:
    inputs:
      build_version:
        description: "Specifies the build version to apply to all binaries produced by this workflow"
        type: string
        required: true
  workflow_dispatch:

permissions: {} # No permissions by default

jobs:
  component-check:
    name: Library workflow
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    permissions:
      contents: read
    timeout-minutes: 60

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: false
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            cas-bridge.xethub.hf.com:443
            cas-server.xethub.hf.com:443
            download.pytorch.org:443
            download-r2.pytorch.org:443
            files.pythonhosted.org:443
            github.com:443
            huggingface.co:443
            pypi.org:443
            raw.githubusercontent.com:443
            releases.astral.sh:443
            release-assets.githubusercontent.com:443
            transfer.xethub.hf.co:443
            us.aws.cdn.hf.co:443

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          uv-cache-dependency-glob: "library/uv.lock"

      - name: Lint library
        working-directory: library
        run: |
          just lint || exit 0

      - name: Run library tests
        working-directory: library
        run: |
          just tests
