name: Release
on:
  repository_dispatch:
    types: [release-build]

permissions: {} # No permissions by default

jobs:

  validate-release:
    name: Validate release data
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate commit and tag SHA match
        env:
          COMMIT_SHA: ${{ github.event.client_payload.commit_sha }}
          TAG_NAME: ${{ github.event.client_payload.tag_name }}
        run: |
          echo "Validating release data..."
          echo "Commit SHA: ${COMMIT_SHA}"
          echo "Tag name: ${TAG_NAME}"

          if [ -n "${TAG_NAME}" ]; then
            echo "Fetching tag: ${TAG_NAME}"
            git fetch origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}" || {
              echo "::error::Failed to fetch tag ${TAG_NAME}"
              exit 1
            }

            TAG_SHA=$(git rev-list -n 1 "refs/tags/${TAG_NAME}")
            echo "Tag SHA: ${TAG_SHA}"

            if [ "${COMMIT_SHA}" != "${TAG_SHA}" ]; then
              echo "::error::Commit SHA (${COMMIT_SHA}) does not match tag SHA (${TAG_SHA})"
              echo "::error::The release-build event data is inconsistent"
              exit 1
            fi

            echo "✓ Commit SHA and tag SHA match"
          else
            echo "::error::No tag name provided in payload"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event.client_payload.commit_sha }}

      - name: Validate tag matches VERSION file
        env:
          TAG_NAME: ${{ github.event.client_payload.tag_name }}
        run: |
          echo "Validating tag name matches VERSION file..."

          VERSION_FILE="VERSION"
          if [ ! -f "${VERSION_FILE}" ]; then
            echo "::error::VERSION file not found in repository"
            exit 1
          fi

          VERSION_CONTENT=$(cat "${VERSION_FILE}" | tr -d '[:space:]')
          EXPECTED_TAG="v${VERSION_CONTENT}"

          echo "VERSION file content: ${VERSION_CONTENT}"
          echo "Expected tag: ${EXPECTED_TAG}"
          echo "Actual tag: ${TAG_NAME}"

          if [ "${TAG_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "::error::Tag name (${TAG_NAME}) does not match expected tag (${EXPECTED_TAG})"
            echo "::error::Tag should be 'v' + VERSION file content"
            exit 1
          fi

          echo "✓ Tag name matches VERSION file"
  
  build-images:
    name: Build docker images
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for keyless signing with cosign
      packages: write # Required to push to GitHub Container Registry
    timeout-minutes: 30
    strategy:
      matrix:
        ai-device: [cpu, xpu]
    steps:

      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.client_payload.commit_sha }}

      - name: Initial cleanup
        uses: ./.github/actions/cleanup-runner
        with:
          type: "initial"

      - name: Install Just
        uses: extractions/setup-just@e33e0265a09d6d736e2ee1e0eb685ef1de4669ff # v3.0.0
        with:
          just-version: '1.43.1'

      - name: Install uv
        uses: astral-sh/setup-uv@1e862dfacbd1d6d858c55d9b792c756523627244 # v7.1.4
        with:
          version: "0.9.7"
          enable-cache: true
          cache-dependency-glob: "application/backend/uv.lock"

      - name: Build docker image for ${{ matrix.ai-device }}
        working-directory: application
        env:
          DEVICE: ${{ matrix.ai-device }}
        run: |
          just images-registry="ghcr.io/open-edge-platform" ai-device="${DEVICE}" docker-build-context="--no-cache" build-image

      - name: Get image name
        id: image-name
        working-directory: application
        env:
          DEVICE: ${{ matrix.ai-device }}
        run: |
          IMAGE_NAME=$(just --evaluate images-registry="ghcr.io/open-edge-platform" ai-device="${DEVICE}" docker-image)
          echo "image=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "Image to sign: ${IMAGE_NAME}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # - name: Push docker image
