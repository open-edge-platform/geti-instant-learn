name: Promote RC App Images

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: "RC tag version (example: app/v0.1.0rc1)"
        required: true
        type: string
      sha:
        description: "Expected 40-char commit SHA for the RC tag"
        required: true
        type: string

permissions: {} # No permissions by default

jobs:
  promote-docker:
    name: Promote RC image to release image
    runs-on: ubuntu-latest
    environment: "prod"
    permissions:
      contents: read
      packages: write # Permission to push packages to GHCR
      id-token: write # Permission to request OIDC token for signing images
    timeout-minutes: 30
    strategy:
      matrix:
        ai-device: ["xpu"]
    env:
      RC_TAG: ${{ inputs.rc_tag }}
      EXPECTED_SHA: ${{ inputs.sha }}
      DEVICE: ${{ matrix.ai-device }}
    steps:
      - name: Normalize and validate inputs
        env:
          RC_TAG_INPUT: ${{ inputs.rc_tag }}
          EXPECTED_SHA: ${{ inputs.sha }}
        run: |
          RC_TAG="${RC_TAG_INPUT#app/v}"

          if [[ ! "${RC_TAG}" =~ ^[0-9]+\.[0-9]+\.[0-9]+rc[0-9]+$ ]]; then
            echo "Error: rc_tag must match '<major>.<minor>.<patch>rc<N>'"
            echo "Received: ${RC_TAG_INPUT}"
            exit 1
          fi

          if [[ ! "${EXPECTED_SHA}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "Error: sha must be exactly 40 hex characters"
            echo "Received: ${EXPECTED_SHA}"
            exit 1
          fi

          RELEASE_TAG="$(echo "${RC_TAG}" | sed -E 's/rc[0-9]+$//')"
          if [[ "${RELEASE_TAG}" == "${RC_TAG}" ]]; then
            echo "Error: could not derive release tag from rc tag '${RC_TAG}'"
            exit 1
          fi

          echo "RC_TAG=${RC_TAG}" >> "$GITHUB_ENV"
          echo "EXPECTED_SHA=${EXPECTED_SHA,,}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"

      - name: Checkout RC tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.rc_tag }}

      - name: Validate checked out tag SHA
        run: |
          TAG_REF="app/v${RC_TAG}"
          HEAD_SHA="$(git rev-parse HEAD)"
          TAG_SHA="$(git rev-list -n 1 "${TAG_REF}")"

          echo "Expected SHA: ${EXPECTED_SHA}"
          echo "Tag SHA:      ${TAG_SHA}"
          echo "Checked-out:  ${HEAD_SHA}"

          if [[ "${TAG_SHA}" != "${EXPECTED_SHA}" ]]; then
            echo "Error: tag SHA does not match provided sha"
            exit 1
          fi

          if [[ "${HEAD_SHA}" != "${EXPECTED_SHA}" ]]; then
            echo "Error: checked-out commit SHA does not match provided sha"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote image for ${{ matrix.ai-device }}
        run: |
          SOURCE_IMAGE="ghcr.io/open-edge-platform/geti-instant-learn-test-${DEVICE}:${RC_TAG}"
          TARGET_IMAGE="ghcr.io/open-edge-platform/geti-instant-learn-test-${DEVICE}:${RELEASE_TAG}"

          echo "Pulling ${SOURCE_IMAGE}"
          docker pull "${SOURCE_IMAGE}"

          echo "Tagging ${TARGET_IMAGE}"
          docker tag "${SOURCE_IMAGE}" "${TARGET_IMAGE}"

          echo "Pushing ${TARGET_IMAGE}"
          docker push "${TARGET_IMAGE}"
