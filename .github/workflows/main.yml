name: main
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - v[0-9]+\.[0-9]+\.[0-9]+-RC[0-9]+

permissions: {} # No permissions by default

concurrency:
  group: ${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-parameters:
    name: Prepare build parameters
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    outputs:
      build_version: "${{ steps.build-version.outputs.version }}"
      components-list: ${{ steps.change-detection.outputs.paths_list }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: change-detection
        id: change-detection
        uses: ./.github/actions/change-detection

      - name: build-version
        id: build-version
        uses: ./.github/actions/build-version

  library:
    name: Library build
    needs: build-parameters
    permissions:
      contents: read
    if: needs.build-parameters.outputs.components-list && contains(fromJson(needs.build-parameters.outputs.components-list), 'library')
    uses: ./.github/workflows/library.yml
    with:
      build_version: ${{ needs.build-parameters.outputs.build_version }}

  backend:
    name: Backend build
    needs: build-parameters
    permissions:
      contents: read
    if: needs.build-parameters.outputs.components-list && contains(fromJson(needs.build-parameters.outputs.components-list), 'backend')
    uses: ./.github/workflows/backend.yml
    with:
      build_version: ${{ needs.build-parameters.outputs.build_version }}

  ui:
    name: UI build
    needs: build-parameters
    permissions:
      contents: read
      pull-requests: write
    if: needs.build-parameters.outputs.components-list && contains(fromJson(needs.build-parameters.outputs.components-list), 'ui')
    uses: ./.github/workflows/ui.yml

  distrib:
    name: Distrib build
    needs: [build-parameters]
    permissions:
      contents: read
    if: github.event_name != 'push' && needs.build-parameters.outputs.components-list && contains(fromJson(needs.build-parameters.outputs.components-list), 'distrib')
    uses: ./.github/workflows/distrib.yml
    with:
      build_version: ${{ needs.build-parameters.outputs.build_version }}

  markdown:
    name: Markdown build
    needs: build-parameters
    permissions:
      contents: read
    if: needs.build-parameters.outputs.components-list && contains(fromJson(needs.build-parameters.outputs.components-list), 'markdown')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: application/ui/.nvmrc
          package-manager-cache: false

      - name: Validate MDX syntax in Markdown
        shell: bash
        run: |
          echo "Validating MDX/JSX syntax in Markdown files..."
          WORKDIR=$(mktemp -d)
          cd "$WORKDIR"
          npm init -y >/dev/null 2>&1
          npm install --no-save @mdx-js/mdx@3 remark-comment fast-glob >/dev/null 2>&1
          cat > "$WORKDIR/validate-mdx.mjs" << 'SCRIPT'
          import { readFile } from "node:fs/promises";
          import fg from "fast-glob";
          import { compile } from "@mdx-js/mdx";
          import remarkComment from 'remark-comment';
          const workspace = process.env.WORKSPACE;
          process.chdir(workspace);
          const files = await fg(["application/docs/**/*.md", "library/docs/**/*.md"], {
            ignore: [
              "**/node_modules/**",
              "**/.git/**",
              "**/.venv/**",
              "**/dist/**",
              "**/build/**",
              "**/.next/**"
            ]
          });
          console.log(`Found ${files.length} markdown file(s) to validate\n`);
          let hasErrors = false;
          let errorCount = 0;
          for (const file of files) {
            try {
              const source = await readFile(file, "utf8");
              await compile(source, { filepath: file, remarkPlugins: [remarkComment] });
              process.stdout.write(".");
            } catch (error) {
              hasErrors = true;
              errorCount++;
              process.stdout.write("\n");
              console.error(`\n❌ MDX parse error in ${file}:`);
              console.error(error.message ?? error);
              if (error.position) {
                console.error(`   Line ${error.position.start.line}, Column ${error.position.start.column}`);
              }
            }
          }
          console.log("\n");
          if (hasErrors) {
            console.error(`❌ Found ${errorCount} file(s) with MDX/JSX syntax errors`);
            process.exit(1);
          } else {
            console.log(`✅ All ${files.length} file(s) passed MDX validation`);
          }
          SCRIPT
          WORKSPACE="$GITHUB_WORKSPACE" NODE_PATH="$WORKDIR/node_modules" node "$WORKDIR/validate-mdx.mjs"

      - uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101 #v22.0.0
        with:
          config: ".github/.markdownlint-cli2.jsonc"

  success:
    name: Status checks
    needs: [build-parameters, library, backend, ui, distrib, markdown]
    runs-on: ubuntu-latest
    if: ${{ always() && !cancelled() }}
    env:
      CHECKS: ${{ join(needs.*.result, ' ') }}
    steps:
      - name: Check
        run: |
          for check in ${CHECKS}; do
            echo "::notice::check=${check}"
            if [[ "$check" != "success" && "$check" != "skipped" ]]; then
              echo "::error ::Required status checks failed. They must succeed before this pull request can be merged."
              exit 1
            fi
          done
