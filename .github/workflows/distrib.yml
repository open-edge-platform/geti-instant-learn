name: distrib
on:
  schedule:
    - cron: '0 0 * * *' # Run every day at midnight UTC
  workflow_call:
    inputs:
      build_version:
        description: "Specifies the build version to apply to all binaries produced by this workflow"
        type: string
        required: true
      sha-commit:
        description: "SHA to checkout"
        type: string
        default: ""
        required: false
  workflow_dispatch:
jobs:
  component-check:
    name: Distrib workflow
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      matrix:
        ai-device: [cpu, gpu, xpu]
    steps:
      - name: Validate SHA format
        if: inputs.sha-commit != ''
        env:
          SHA_COMMIT: ${{ inputs.sha-commit }}
        run: |
          if ! echo "${SHA_COMMIT}" | grep -qE '^[0-9a-f]{40}$'; then
            echo "Error: Invalid SHA format. Expected 40 hexadecimal characters."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.sha-commit || '' }}

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          uv-cache-dependency-glob: 'application/backend/uv.lock'
          cleanup-runner: 'true'

      - name: Build docker image for ${{ matrix.ai-device }}
        working-directory: application
        env:
          BUILD_VERSION: ${{ inputs.build_version || 'latest' }}
          DEVICE: ${{ matrix.ai-device }}
        run: |
          just ai-device="${DEVICE}" version="${BUILD_VERSION}" docker-build-context="--no-cache" build-image

      - name: Show size of the image for ${{ matrix.ai-device }}
        working-directory: application
        env:
          BUILD_VERSION: ${{ inputs.build_version || 'latest' }}
          DEVICE: ${{ matrix.ai-device }}
        run: |
          just ai-device="${DEVICE}" version="${BUILD_VERSION}" show-size

      - name: Test image for ${{ matrix.ai-device }}
        working-directory: application
        env:
          BUILD_VERSION: ${{ inputs.build_version || 'latest' }}
          DEVICE: ${{ matrix.ai-device }}
        run: |
          just ai-device="${DEVICE}" version="${BUILD_VERSION}" test-image

  create-issue-on-failure:
    name: Create issue on scheduled workflow failure
    runs-on: ubuntu-latest
    needs: component-check
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write
    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const workflowRunUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const issueTitle = `[Scheduled Check] Distrib workflow failed - ${new Date().toISOString().split('T')[0]}`;
            const issueBody = `## Bug Report

            **Type:** Bug

            **Description:** The scheduled distrib workflow has failed.

            **Failed Workflow Run:** [View the failed run](${workflowRunUrl})

            **Triggered at:** ${new Date().toISOString()}

            **Workflow:** ${context.workflow}

            **Run ID:** ${context.runId}

            Please investigate the failure and take appropriate action.
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['bug']
            });
