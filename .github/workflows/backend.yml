name: backend
on:
  workflow_call:
    inputs:
      build_version:
        description: "Specifies the build version to apply to all binaries produced by this workflow"
        type: string
        required: true
  workflow_dispatch:

permissions: {} # No permissions by default

jobs:
  component-check:
    name: Backend workflow
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    permissions:
      contents: read
    timeout-minutes: 30

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: false
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            auth.docker.io:443
            download.pytorch.org:443
            download-r2.pytorch.org:443
            files.pythonhosted.org:443
            github.com:443
            production.cloudflare.docker.com:443
            production.cloudfront.docker.com:443
            pypi.org:443
            raw.githubusercontent.com:443
            registry-1.docker.io:443
            releases.astral.sh:443
            release-assets.githubusercontent.com:443

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          uv-cache-dependency-glob: "application/backend/uv.lock"

      - name: Lint backend
        working-directory: application/backend
        run: |
          just lint

      - name: Run backend tests
        working-directory: application/backend
        run: |
          just tests
