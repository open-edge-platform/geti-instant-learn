name: backend
on:
  workflow_call:
    inputs:
      build_version:
        description: "Specifies the build version to apply to all binaries produced by this workflow"
        type: string
        required: true
  workflow_dispatch:

permissions: {} # No permissions by default

jobs:
  component-check:
    name: Backend workflow
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    permissions:
      contents: read
    timeout-minutes: 30

    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          uv-cache-dependency-glob: "application/backend/uv.lock"

      - name: Lint backend
        working-directory: application/backend
        run: |
          just lint

      - name: Run backend tests
        working-directory: application/backend
        run: |
          just tests
