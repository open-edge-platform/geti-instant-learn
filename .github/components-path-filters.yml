# Main components
library:  # SDK component
  - library/**
  - .github/workflows/**
application:  # Studio application (UI + Backend)
  - application/**
  - .github/workflows/**

# Application sub-components (optional granular triggers)
backend:  # Backend component
  - application/backend/**
  - library/**  # Backend might depend on library changes
  - .github/workflows/**
ui:  # UI component
  - application/ui/**
  - .github/workflows/**
